<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Space Invaders Clone</title>
    <style>
      :root {
        --bg: #03040a;
        --panel: #0a1020;
        --line: #223155;
        --text: #dbe6ff;
        --accent: #8ff7a7;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 20% 10%, #1f2b4d 0, transparent 35%),
          radial-gradient(circle at 80% 20%, #0e3c47 0, transparent 30%),
          linear-gradient(180deg, #04060f, #020308 70%);
        color: var(--text);
        font-family: "Trebuchet MS", "Verdana", sans-serif;
      }

      .game-wrap {
        width: min(96vw, 780px);
        padding: 16px;
        border: 2px solid var(--line);
        border-radius: 12px;
        background: linear-gradient(180deg, #0b1222, var(--panel));
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.45);
      }

      h1 {
        margin: 0 0 10px;
        font-size: 1.15rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--accent);
      }

      .meta {
        display: flex;
        gap: 14px;
        flex-wrap: wrap;
        margin-bottom: 12px;
        font-size: 0.95rem;
      }

      canvas {
        display: block;
        width: min(92vw, 680px);
        max-width: 100%;
        aspect-ratio: 224 / 256;
        border: 1px solid #2a3b60;
        border-radius: 8px;
        background: #000;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      }

      .hint {
        margin-top: 10px;
        color: #b9c8e8;
        font-size: 0.9rem;
      }

      button {
        margin-top: 12px;
        border: 0;
        border-radius: 7px;
        padding: 8px 12px;
        font-family: inherit;
        font-weight: 700;
        cursor: pointer;
        background: #22d3ee;
        color: #03111a;
      }

      button:hover {
        filter: brightness(1.07);
      }
    </style>
  </head>
  <body>
    <div class="game-wrap">
      <h1>Space Invaders</h1>
      <div class="meta">
        <div>Score: <strong id="score">0</strong></div>
        <div>Best: <strong id="best">0</strong></div>
        <div>Lives: <strong id="lives">3</strong></div>
        <div>Level: <strong id="level">1</strong></div>
      </div>
      <canvas id="game" width="224" height="256" aria-label="Space Invaders game area"></canvas>
      <div class="hint">
        Arrow keys only: <strong>Left / Right</strong> to move, <strong>Up</strong> to fire.
      </div>
      <button id="restart" type="button">Restart</button>
    </div>

      };

      const PLAYER_W = PLAYER_SPRITE[0].length;
      const PLAYER_H = PLAYER_SPRITE.length;
      const ALIEN_W = 8;
      const ALIEN_H = 8;
      const UFO_W = UFO_SPRITE[0].length;
      const UFO_H = UFO_SPRITE.length;

      const SAVE_KEY = "space-invaders-best-score";
      let bestScore = Number(localStorage.getItem(SAVE_KEY) || 0);

      const input = {
        left: false,
        right: false,
        up: false,
      };

      const stars = Array.from({ length: 40 }, () => ({
        x: Math.floor(Math.random() * WIDTH),
        y: Math.floor(Math.random() * HEIGHT),
        s: Math.random() > 0.7 ? 2 : 1,
      }));

      let score = 0;
      let lives = 3;
      let level = 1;
      let gameOver = false;
      let roundPause = 0;
      let pendingWave = false;

      let player = {
        x: Math.floor((WIDTH - PLAYER_W) / 2),
        y: HEIGHT - 16,
        speed: 88,
        fireCooldown: 0,
        invulnerable: 0,
      };

      let playerBullet = null;
      let alienBullets = [];
      let aliens = [];
      let alienDirection = 1;
      let alienFrame = 0;
      let alienMoveTimer = 0;
      let alienShootTimer = 0;

      let shields = [];

      let ufo = {
        active: false,
        x: 0,
        y: 18,
        dir: 1,
        speed: 42,
        score: 100,
        spawnTimer: randomRange(8, 16),
      };

      let lastTimestamp = 0;
      let rafId = 0;

      function randomRange(min, max) {
        return min + Math.random() * (max - min);
      }

      function cloneMask(template) {
        return template.map((row) => row.split("").map((c) => c === "1"));
      }

      function createShields() {
        const positions = [20, 66, 112, 158];
        const y = 188;
        shields = positions.map((x) => ({
          x,
          y,
          w: SHIELD_TEMPLATE[0].length,
          h: SHIELD_TEMPLATE.length,
          mask: cloneMask(SHIELD_TEMPLATE),
        }));
      }

      function addScore(points) {
        score += points;
        if (score > bestScore) {
          bestScore = score;
          localStorage.setItem(SAVE_KEY, String(bestScore));
        }
      }

      function createWave() {
        aliens = [];

        const startX = 20;
        const startY = 34;
        const gapX = 12;
        const gapY = 11;

        for (let row = 0; row < 5; row += 1) {
          for (let col = 0; col < 11; col += 1) {
            aliens.push({
              x: startX + col * gapX,
              y: startY + row * gapY,
              row,
              alive: true,
            });
          }
        }

        alienDirection = 1;
        alienFrame = 0;
        alienMoveTimer = 0;
        alienShootTimer = 0;
        playerBullet = null;
        alienBullets = [];
      }

      function resetGame() {
        score = 0;
        lives = 3;
        level = 1;
        gameOver = false;
        roundPause = 0.7;
        pendingWave = false;

        player = {
          x: Math.floor((WIDTH - PLAYER_W) / 2),
          y: HEIGHT - 16,
          speed: 88,
          fireCooldown: 0,
          invulnerable: 0,
        };

        createShields();
        createWave();
        resetUfoTimer();
        updateHud();
      }

      function resetUfoTimer() {
        ufo.active = false;
        ufo.spawnTimer = randomRange(8, 16);
      }

      function alienPoints(row) {
        if (row === 0) return 30;
        if (row <= 2) return 20;
        return 10;
      }

      function aliveAliens() {
        return aliens.filter((a) => a.alive);
      }

      function alienMoveDelay() {
        const alive = aliveAliens().length;
        return Math.max(0.07, 0.62 - (55 - alive) * 0.008 - (level - 1) * 0.035);
      }

      function alienShootDelay() {
        const alive = aliveAliens().length;
        return Math.max(0.2, 1.05 - (55 - alive) * 0.011 - (level - 1) * 0.08);
      }

      function rectHit(ax, ay, aw, ah, bx, by, bw, bh) {
        return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
      }

      function getAlienSprite(row, frame) {
        if (row === 0) return ALIEN_SPRITES.top[frame];
        if (row <= 2) return ALIEN_SPRITES.mid[frame];
        return ALIEN_SPRITES.low[frame];
      }

      function drawPattern(pattern, x, y, color) {
        ctx.fillStyle = color;
        for (let py = 0; py < pattern.length; py += 1) {
          const row = pattern[py];
          for (let px = 0; px < row.length; px += 1) {
            if (row[px] === "1") {
              ctx.fillRect(x + px, y + py, 1, 1);
            }
          }
        }
      }

      function drawPixelText(text, x, y, color, scale = 1) {
        ctx.fillStyle = color;
        let cursorX = x;
        const upper = text.toUpperCase();

        for (const ch of upper) {
          const glyph = HUD_FONT[ch] || HUD_FONT[" "];
          for (let gy = 0; gy < glyph.length; gy += 1) {
            for (let gx = 0; gx < glyph[gy].length; gx += 1) {
              if (glyph[gy][gx] === "1") {
                ctx.fillRect(cursorX + gx * scale, y + gy * scale, scale, scale);
              }
            }
          }
          cursorX += (5 + 1) * scale;
        }
      }

      function damageShield(worldX, worldY, radius) {
        for (const shield of shields) {
          const lx = Math.floor(worldX - shield.x);
          const ly = Math.floor(worldY - shield.y);

          if (lx < 0 || ly < 0 || lx >= shield.w || ly >= shield.h) continue;
          if (!shield.mask[ly][lx]) continue;

          const rSq = radius * radius;
          const minY = Math.floor(ly - radius);
          const maxY = Math.ceil(ly + radius);
          const minX = Math.floor(lx - radius);
          const maxX = Math.ceil(lx + radius);

          for (let y = minY; y <= maxY; y += 1) {
            if (y < 0 || y >= shield.h) continue;
            for (let x = minX; x <= maxX; x += 1) {
              if (x < 0 || x >= shield.w) continue;
              const dx = x - lx;
              const dy = y - ly;
              if (dx * dx + dy * dy <= rSq) {
                shield.mask[y][x] = false;
              }
            }
          }

          return true;
        }

        return false;
      }

      function moveAliens() {
        const alive = aliveAliens();
        if (alive.length === 0) return;

        let minX = Infinity;
        let maxX = -Infinity;
        let maxY = -Infinity;

        for (const a of alive) {
          if (a.x < minX) minX = a.x;
          if (a.x + ALIEN_W > maxX) maxX = a.x + ALIEN_W;
          if (a.y + ALIEN_H > maxY) maxY = a.y + ALIEN_H;
        }

        const hitEdgeRight = alienDirection === 1 && maxX + 2 >= WIDTH - 4;
        const hitEdgeLeft = alienDirection === -1 && minX - 2 <= 4;

        if (hitEdgeRight || hitEdgeLeft) {
          alienDirection *= -1;
          for (const a of alive) a.y += 6;
        } else {
          for (const a of alive) a.x += alienDirection * 2;
        }

        alienFrame = 1 - alienFrame;

        if (maxY >= player.y - 2) {
          gameOver = true;
          roundPause = 0;
        }
      }

      function bottomShooters() {
        const map = new Map();
        for (const a of aliveAliens()) {
          const existing = map.get(a.x);
          if (!existing || a.y > existing.y) {
            map.set(a.x, a);
          }
        }
        return [...map.values()];
      }

      function alienShoot() {
        if (gameOver) return;
        if (alienBullets.length >= Math.min(6, 3 + level)) return;

        const shooters = bottomShooters();
        if (!shooters.length) return;

        const shooter = shooters[Math.floor(Math.random() * shooters.length)];
        alienBullets.push({
          x: shooter.x + Math.floor(ALIEN_W / 2),
          y: shooter.y + ALIEN_H,
          vy: 90 + level * 8,
        });
      }

      function spawnUfo() {
        ufo.active = true;
        ufo.dir = Math.random() < 0.5 ? 1 : -1;
        ufo.x = ufo.dir === 1 ? -UFO_W : WIDTH + UFO_W;
        ufo.score = [50, 100, 150, 300][Math.floor(Math.random() * 4)];
      }

      function tryShoot() {
        if (gameOver || roundPause > 0) return;
        if (player.fireCooldown > 0 || playerBullet) return;

        playerBullet = {
          x: Math.floor(player.x + PLAYER_W / 2),
          y: player.y - 4,
          vy: -190,
        };

        player.fireCooldown = 0.32;
      }

      function loseLife() {
        if (player.invulnerable > 0 || gameOver) return;

        lives -= 1;
        alienBullets = [];
        playerBullet = null;

        if (lives <= 0) {
          lives = 0;
          gameOver = true;
          roundPause = 0;
        } else {
          player.x = Math.floor((WIDTH - PLAYER_W) / 2);
          player.invulnerable = 1.0;
          roundPause = 0.4;
        }

        updateHud();
      }

      function updateUfo(dt) {
        if (ufo.active) {
          ufo.x += ufo.dir * ufo.speed * dt;
          if ((ufo.dir === 1 && ufo.x > WIDTH + UFO_W) || (ufo.dir === -1 && ufo.x < -UFO_W * 2)) {
            resetUfoTimer();
          }
          return;
        }

        ufo.spawnTimer -= dt;
        if (ufo.spawnTimer <= 0) {
          spawnUfo();
        }
      }

      function updateBullets(dt) {
        if (playerBullet) {
          playerBullet.y += playerBullet.vy * dt;
          if (playerBullet.y < 0) {
            playerBullet = null;
          }
        }

        for (const bullet of alienBullets) {
          bullet.y += bullet.vy * dt;
        }

        alienBullets = alienBullets.filter((b) => b.y < HEIGHT + 6);
      }

      function resolveCollisions() {
        if (playerBullet) {
          if (damageShield(playerBullet.x, playerBullet.y, 2)) {
            playerBullet = null;
          }
        }

        if (playerBullet && ufo.active) {
          if (rectHit(playerBullet.x, playerBullet.y, 1, 4, ufo.x, ufo.y, UFO_W, UFO_H)) {
            addScore(ufo.score);
            playerBullet = null;
            resetUfoTimer();
            updateHud();
          }
        }

        if (playerBullet) {
          for (const alien of aliens) {
            if (!alien.alive) continue;
            if (rectHit(playerBullet.x, playerBullet.y, 1, 4, alien.x, alien.y, ALIEN_W, ALIEN_H)) {
              alien.alive = false;
              addScore(alienPoints(alien.row));
              playerBullet = null;
              updateHud();
              break;
            }
          }
        }

        if (playerBullet) {
          for (let i = alienBullets.length - 1; i >= 0; i -= 1) {
            const b = alienBullets[i];
            if (Math.abs(b.x - playerBullet.x) <= 0 && Math.abs(b.y - playerBullet.y) <= 3) {
              alienBullets.splice(i, 1);
              playerBullet = null;
              break;
            }
          }
        }

        for (let i = alienBullets.length - 1; i >= 0; i -= 1) {
          const b = alienBullets[i];

          if (damageShield(b.x, b.y, 2.2)) {
            alienBullets.splice(i, 1);
            continue;
          }

          if (player.invulnerable <= 0 && rectHit(b.x, b.y, 1, 4, player.x, player.y, PLAYER_W, PLAYER_H)) {
            alienBullets.splice(i, 1);
            loseLife();
            break;
          }
        }
      }

      function advanceWaveIfNeeded() {
        if (gameOver) return;
        if (pendingWave) return;

        if (aliveAliens().length === 0) {
          level += 1;
          pendingWave = true;
          roundPause = 1.0;
          playerBullet = null;
          alienBullets = [];
          updateHud();
        }
      }

      function updateHud() {
        scoreEl.textContent = String(score);
        bestEl.textContent = String(bestScore);
        livesEl.textContent = String(lives);
        levelEl.textContent = String(level);
      }

      function update(dt) {
        if (gameOver) return;

        if (player.fireCooldown > 0) player.fireCooldown -= dt;
        if (player.invulnerable > 0) player.invulnerable -= dt;

        if (input.left !== input.right) {
          player.x += (input.left ? -1 : 1) * player.speed * dt;
          player.x = Math.max(4, Math.min(WIDTH - PLAYER_W - 4, player.x));
        }

        if (input.up) {
          tryShoot();
        }

        updateUfo(dt);

        if (roundPause > 0) {
          roundPause -= dt;
          if (roundPause <= 0 && pendingWave) {
            pendingWave = false;
            createWave();
          }
          return;
        }

        alienMoveTimer += dt;
        const moveDelay = alienMoveDelay();
        while (alienMoveTimer >= moveDelay) {
          alienMoveTimer -= moveDelay;
          moveAliens();
          if (gameOver) break;
        }

        if (gameOver) return;

        alienShootTimer += dt;
        const fireDelay = alienShootDelay();
        while (alienShootTimer >= fireDelay) {
          alienShootTimer -= fireDelay;
          alienShoot();
        }

        updateBullets(dt);
        resolveCollisions();
        advanceWaveIfNeeded();
      }

      function drawStars() {
        ctx.fillStyle = "#152347";
        for (const s of stars) {
          ctx.fillRect(s.x, s.y, s.s, s.s);
        }
      }

      function drawShields() {
        ctx.fillStyle = COLOR_SHIELD;
        for (const shield of shields) {
          for (let y = 0; y < shield.h; y += 1) {
            for (let x = 0; x < shield.w; x += 1) {
              if (shield.mask[y][x]) {
                ctx.fillRect(shield.x + x, shield.y + y, 1, 1);
              }
            }
          }
        }
      }

      function drawAliens() {
        for (const alien of aliens) {
          if (!alien.alive) continue;
          const sprite = getAlienSprite(alien.row, alienFrame);
          drawPattern(sprite, alien.x, alien.y, COLOR_ALIEN);
        }
      }

      function drawPlayer() {
        if (gameOver) return;
        if (player.invulnerable > 0 && Math.floor(player.invulnerable * 10) % 2 === 0) {
          return;
        }
        drawPattern(PLAYER_SPRITE, Math.round(player.x), player.y, COLOR_PLAYER);
      }

      function drawBullets() {
        if (playerBullet) {
          ctx.fillStyle = COLOR_BULLET;
          ctx.fillRect(playerBullet.x, playerBullet.y, 1, 4);
        }

        ctx.fillStyle = COLOR_ALIEN_BULLET;
        for (const b of alienBullets) {
          ctx.fillRect(b.x, b.y, 1, 4);
        }
      }

      function drawUfo() {
        if (!ufo.active) return;
        drawPattern(UFO_SPRITE, Math.round(ufo.x), ufo.y, COLOR_UFO);
      }

      function drawUi() {
        ctx.fillStyle = COLOR_UI;
        const scoreText = String(score).padStart(4, "0");
        const hiText = String(bestScore).padStart(4, "0");

        drawPixelText(`SCORE<1> ${scoreText}`, 6, 2, COLOR_UI, 1);
        drawPixelText(`HI-SCORE ${hiText}`, 78, 2, COLOR_UI, 1);
        drawPixelText(`LV ${level}`, 188, 2, COLOR_UI, 1);

        ctx.fillRect(0, 14, WIDTH, 1);
        ctx.fillRect(0, HEIGHT - 13, WIDTH, 1);

        for (let i = 0; i < lives; i += 1) {
          drawPattern(PLAYER_SPRITE, 6 + i * 16, HEIGHT - 11, COLOR_PLAYER);
        }
      }

      function drawOverlay() {
        if (!gameOver) {
          if (pendingWave || roundPause > 0.5) {
            ctx.fillStyle = "#9effa2";
            ctx.font = "8px monospace";
            const msg = pendingWave ? `WAVE ${level}` : "READY";
            const width = ctx.measureText(msg).width;
            ctx.fillText(msg, Math.floor((WIDTH - width) / 2), Math.floor(HEIGHT / 2));
          }
          return;
        }

        ctx.fillStyle = "rgba(0, 0, 0, 0.65)";
        ctx.fillRect(20, 96, WIDTH - 40, 60);
        ctx.strokeStyle = "#6fd78e";
        ctx.strokeRect(20, 96, WIDTH - 40, 60);

        ctx.fillStyle = "#9effa2";
        ctx.font = "9px monospace";
        const t1 = "GAME OVER";
        const t2 = "Press Restart";
        const w1 = ctx.measureText(t1).width;
        const w2 = ctx.measureText(t2).width;

        ctx.fillText(t1, Math.floor((WIDTH - w1) / 2), 122);
        ctx.fillText(t2, Math.floor((WIDTH - w2) / 2), 136);
      }

      function render() {
        ctx.fillStyle = COLOR_BG;
        ctx.fillRect(0, 0, WIDTH, HEIGHT);

        drawStars();
        drawShields();
        drawAliens();
        drawUfo();
        drawBullets();
        drawPlayer();
        drawUi();
        drawOverlay();
      }

      function loop(timestamp) {
        if (!lastTimestamp) lastTimestamp = timestamp;
        const dt = Math.min(0.033, (timestamp - lastTimestamp) / 1000);
        lastTimestamp = timestamp;

        update(dt);
        render();

        rafId = requestAnimationFrame(loop);
      }

      document.addEventListener("keydown", (e) => {
        if (["ArrowLeft", "ArrowRight", "ArrowUp"].includes(e.key)) {
          e.preventDefault();
        }

        if (e.key === "ArrowLeft") input.left = true;
        if (e.key === "ArrowRight") input.right = true;
        if (e.key === "ArrowUp") input.up = true;
      });

      document.addEventListener("keyup", (e) => {
        if (e.key === "ArrowLeft") input.left = false;
        if (e.key === "ArrowRight") input.right = false;
        if (e.key === "ArrowUp") input.up = false;
      });

      restartBtn.addEventListener("click", () => {
        cancelAnimationFrame(rafId);
        lastTimestamp = 0;
        resetGame();
        render();
        rafId = requestAnimationFrame(loop);
      });

      resetGame();
      render();
      rafId = requestAnimationFrame(loop);
    </script>
  </body>
</html>
