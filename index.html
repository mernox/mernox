<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ASCII Space Invaders</title>
    <style>
      :root {
        --bg: #090f1f;
        --panel: #0f1a2f;
        --text: #e2e8f0;
        --accent: #7dd3fc;
        --danger: #fb7185;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at top, #1e293b, var(--bg));
        color: var(--text);
        font-family: "Courier New", Courier, monospace;
      }

      .game-wrap {
        width: min(96vw, 760px);
        padding: 16px;
        border: 2px solid #334155;
        border-radius: 10px;
        background: linear-gradient(180deg, #0b1220, var(--panel));
        box-shadow: 0 10px 35px rgba(0, 0, 0, 0.4);
      }

      h1 {
        margin: 0 0 8px;
        font-size: 1.15rem;
        color: var(--accent);
      }

      .meta {
        display: flex;
        gap: 16px;
        flex-wrap: wrap;
        margin-bottom: 10px;
      }

      pre {
        margin: 0;
        padding: 10px;
        border: 1px solid #334155;
        border-radius: 6px;
        background: #020617;
        color: var(--text);
        line-height: 1.12;
        font-size: clamp(10px, 1.45vw, 14px);
        min-height: 420px;
        overflow: auto;
        user-select: none;
      }

      .hint {
        margin-top: 10px;
        color: #cbd5e1;
        font-size: 0.9rem;
      }

      .danger {
        color: var(--danger);
      }

      button {
        margin-top: 12px;
        border: 0;
        border-radius: 6px;
        padding: 8px 12px;
        font-family: inherit;
        font-weight: 700;
        cursor: pointer;
        background: #0ea5e9;
        color: #03111f;
      }

      button:hover {
        filter: brightness(1.1);
      }
    </style>
  </head>
  <body>
    <div class="game-wrap">
      <h1>ASCII Space Invaders</h1>
      <div class="meta">
        <div>Score: <strong id="score">0</strong></div>
        <div>Lives: <strong id="lives">3</strong></div>
        <div>Level: <strong id="level">1</strong></div>
        <div>Best: <strong id="best">0</strong></div>
      </div>
      <pre id="screen" aria-label="ASCII game area"></pre>
      <div class="hint">
        <strong>ArrowLeft/ArrowRight</strong> move, <strong>ArrowUp</strong> shoots.
        Protect yourself behind shields and stop the invasion.
      </div>
      <button id="restart" type="button">Restart</button>
    </div>

    <script>
      const WIDTH = 44;
      const HEIGHT = 24;
      const PLAYER_Y = HEIGHT - 2;

      const screen = document.getElementById("screen");
      const scoreEl = document.getElementById("score");
      const livesEl = document.getElementById("lives");
      const levelEl = document.getElementById("level");
      const bestEl = document.getElementById("best");
      const restartBtn = document.getElementById("restart");

      const bestStorageKey = "ascii-space-invaders-best";
      let best = Number(localStorage.getItem(bestStorageKey) || 0);
      bestEl.textContent = String(best);

      let leftPressed = false;
      let rightPressed = false;

      let playerX = 0;
      let playerBullet = null;
      let alienBullets = [];
      let aliens = [];
      let shields = new Map();
      let alienDir = 1;
      let alienFrame = 0;
      let score = 0;
      let lives = 3;
      let level = 1;
      let gameOver = false;
      let statusText = "";

      let lastTime = 0;
      let rafId = 0;
      let moveTimer = 0;
      let playerBulletTimer = 0;
      let alienBulletTimer = 0;
      let alienMoveTimer = 0;
      let alienFireTimer = 0;

      function resetGame() {
        score = 0;
        lives = 3;
        level = 1;
        gameOver = false;
        statusText = "";
        startLevel(level);
        updateHud();
      }

      function startLevel(nextLevel) {
        level = nextLevel;
        playerX = Math.floor(WIDTH / 2);
        playerBullet = null;
        alienBullets = [];
        alienDir = 1;
        alienFrame = 0;
        moveTimer = 0;
        playerBulletTimer = 0;
        alienBulletTimer = 0;
        alienMoveTimer = 0;
        alienFireTimer = 0;
        buildAliens();
        buildShields();
        statusText = "";
        updateHud();
      }

      function buildAliens() {
        aliens = [];
        const rows = 5;
        const cols = 11;
        const startX = 6;
        const startY = 2;
        const spacingX = 3;
        const spacingY = 2;

        for (let row = 0; row < rows; row += 1) {
          for (let col = 0; col < cols; col += 1) {
            aliens.push({
              x: startX + col * spacingX,
              y: startY + row * spacingY,
              row,
              alive: true,
            });
          }
        }
      }

      function buildShields() {
        shields = new Map();
        const pattern = [" #### ", "######", "##  ##"];
        const baseY = HEIGHT - 7;
        const starts = [3, 14, 25, 36];

        for (const startX of starts) {
          for (let y = 0; y < pattern.length; y += 1) {
            for (let x = 0; x < pattern[y].length; x += 1) {
              if (pattern[y][x] === "#") {
                const key = `${startX + x},${baseY + y}`;
                shields.set(key, 2);
              }
            }
          }
        }
      }

      function shieldDamageAt(x, y) {
        const key = `${x},${y}`;
        if (!shields.has(key)) return false;
        const hp = shields.get(key) - 1;
        if (hp <= 0) {
          shields.delete(key);
        } else {
          shields.set(key, hp);
        }
        return true;
      }

      function shieldChar(hp) {
        return hp === 2 ? "#" : "=";
      }

      function updateHud() {
        scoreEl.textContent = String(score);
        livesEl.textContent = String(lives);
        levelEl.textContent = String(level);
        bestEl.textContent = String(best);
      }

      function livingAliens() {
        return aliens.filter((a) => a.alive);
      }

      function alienMoveInterval() {
        const alive = livingAliens().length;
        return Math.max(90, 500 - (55 - alive) * 7 - (level - 1) * 35);
      }

      function alienFireInterval() {
        const alive = livingAliens().length;
        return Math.max(260, 980 - (55 - alive) * 9 - (level - 1) * 90);
      }

      function shootPlayerBullet() {
        if (gameOver || playerBullet) return;
        playerBullet = { x: playerX, y: PLAYER_Y - 1 };
        playerBulletTimer = 0;
      }

      function alienValueByRow(row) {
        if (row <= 0) return 30;
        if (row <= 2) return 20;
        return 10;
      }

      function moveAliensOneStep() {
        const alive = livingAliens();
        if (alive.length === 0) return;

        let edgeHit = false;
        for (const alien of alive) {
          const nextX = alien.x + alienDir;
          if (nextX < 0 || nextX >= WIDTH) {
            edgeHit = true;
            break;
          }
        }

        if (edgeHit) {
          alienDir *= -1;
          for (const alien of alive) alien.y += 1;
        } else {
          for (const alien of alive) alien.x += alienDir;
        }

        alienFrame = 1 - alienFrame;

        for (const alien of alive) {
          if (alien.y >= PLAYER_Y) {
            gameOver = true;
            statusText = "INVASION - GAME OVER";
          }
        }
      }

      function bottomAliens() {
        const byColumn = new Map();
        for (const alien of livingAliens()) {
          const key = alien.x;
          const current = byColumn.get(key);
          if (!current || alien.y > current.y) {
            byColumn.set(key, alien);
          }
        }
        return [...byColumn.values()];
      }

      function alienShoot() {
        if (gameOver) return;
        const shooters = bottomAliens();
        if (shooters.length === 0 || alienBullets.length >= 4) return;
        const shooter = shooters[Math.floor(Math.random() * shooters.length)];
        alienBullets.push({ x: shooter.x, y: shooter.y + 1 });
      }

      function loseLife() {
        lives -= 1;
        playerBullet = null;
        alienBullets = [];
        playerX = Math.floor(WIDTH / 2);

        if (lives <= 0) {
          lives = 0;
          gameOver = true;
          statusText = "GAME OVER";
        }

        updateHud();
      }

      function handleBulletCollisions() {
        if (playerBullet) {
          if (shieldDamageAt(playerBullet.x, playerBullet.y)) {
            playerBullet = null;
          }
        }

        if (playerBullet) {
          for (const alien of aliens) {
            if (alien.alive && alien.x === playerBullet.x && alien.y === playerBullet.y) {
              alien.alive = false;
              score += alienValueByRow(alien.row);
              if (score > best) {
                best = score;
                localStorage.setItem(bestStorageKey, String(best));
              }
              playerBullet = null;
              updateHud();
              break;
            }
          }
        }

        if (playerBullet) {
          for (let i = 0; i < alienBullets.length; i += 1) {
            if (alienBullets[i].x === playerBullet.x && alienBullets[i].y === playerBullet.y) {
              alienBullets.splice(i, 1);
              playerBullet = null;
              break;
            }
          }
        }

        for (let i = alienBullets.length - 1; i >= 0; i -= 1) {
          const bullet = alienBullets[i];

          if (shieldDamageAt(bullet.x, bullet.y)) {
            alienBullets.splice(i, 1);
            continue;
          }

          if (bullet.y === PLAYER_Y && bullet.x === playerX) {
            loseLife();
            break;
          }
        }
      }

      function update(delta) {
        if (gameOver) return;

        moveTimer += delta;
        while (moveTimer >= 55) {
          moveTimer -= 55;
          if (leftPressed !== rightPressed) {
            playerX += leftPressed ? -1 : 1;
            playerX = Math.max(0, Math.min(WIDTH - 1, playerX));
          }
        }

        playerBulletTimer += delta;
        while (playerBullet && playerBulletTimer >= 45) {
          playerBulletTimer -= 45;
          playerBullet.y -= 1;
          if (playerBullet.y < 0) {
            playerBullet = null;
          }
        }

        alienBulletTimer += delta;
        while (alienBulletTimer >= 70) {
          alienBulletTimer -= 70;
          for (const bullet of alienBullets) {
            bullet.y += 1;
          }
          alienBullets = alienBullets.filter((b) => b.y < HEIGHT);
        }

        alienMoveTimer += delta;
        const moveInterval = alienMoveInterval();
        while (alienMoveTimer >= moveInterval) {
          alienMoveTimer -= moveInterval;
          moveAliensOneStep();
        }

        alienFireTimer += delta;
        const fireInterval = alienFireInterval();
        while (alienFireTimer >= fireInterval) {
          alienFireTimer -= fireInterval;
          alienShoot();
        }

        handleBulletCollisions();

        if (!gameOver && livingAliens().length === 0) {
          level += 1;
          startLevel(level);
        }
      }

      function render() {
        const grid = Array.from({ length: HEIGHT }, () => Array(WIDTH).fill(" "));

        for (const [key, hp] of shields.entries()) {
          const [x, y] = key.split(",").map(Number);
          if (y >= 0 && y < HEIGHT && x >= 0 && x < WIDTH) {
            grid[y][x] = shieldChar(hp);
          }
        }

        const alienGlyphs = [
          ["W", "M"],
          ["A", "H"],
          ["A", "H"],
          ["V", "U"],
          ["V", "U"],
        ];

        for (const alien of aliens) {
          if (!alien.alive) continue;
          if (alien.y >= 0 && alien.y < HEIGHT && alien.x >= 0 && alien.x < WIDTH) {
            grid[alien.y][alien.x] = alienGlyphs[alien.row][alienFrame];
          }
        }

        if (playerBullet && playerBullet.y >= 0 && playerBullet.y < HEIGHT) {
          grid[playerBullet.y][playerBullet.x] = "|";
        }

        for (const bullet of alienBullets) {
          if (bullet.y >= 0 && bullet.y < HEIGHT) {
            grid[bullet.y][bullet.x] = "!";
          }
        }

        if (!gameOver) {
          grid[PLAYER_Y][playerX] = "A";
        }

        const topBorder = "+" + "-".repeat(WIDTH) + "+";
        const rows = grid.map((row) => "|" + row.join("") + "|");
        let text = [topBorder, ...rows, topBorder].join("\n");

        if (statusText) {
          text += `\n\n${statusText}`;
        }

        if (gameOver) {
          text += "\nPress Restart to play again.";
        }

        screen.textContent = text;
      }

      function loop(timestamp) {
        if (!lastTime) lastTime = timestamp;
        const delta = Math.min(60, timestamp - lastTime);
        lastTime = timestamp;

        update(delta);
        render();

        rafId = requestAnimationFrame(loop);
      }

      document.addEventListener("keydown", (e) => {
        if (e.key === "ArrowLeft" || e.key === "ArrowRight" || e.key === "ArrowUp") {
          e.preventDefault();
        }

        if (e.key === "ArrowLeft") leftPressed = true;
        if (e.key === "ArrowRight") rightPressed = true;
        if (e.key === "ArrowUp") shootPlayerBullet();
      });

      document.addEventListener("keyup", (e) => {
        if (e.key === "ArrowLeft") leftPressed = false;
        if (e.key === "ArrowRight") rightPressed = false;
      });

      restartBtn.addEventListener("click", () => {
        cancelAnimationFrame(rafId);
        lastTime = 0;
        resetGame();
        render();
        rafId = requestAnimationFrame(loop);
      });

      resetGame();
      render();
      rafId = requestAnimationFrame(loop);
    </script>
  </body>
</html>
